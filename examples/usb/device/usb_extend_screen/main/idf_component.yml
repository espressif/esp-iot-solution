version: 0.2.0
targets:
  - esp32p4
  - esp32s3
  - esp32s31
dependencies:
  idf: ">=5.3"
  espressif/tinyusb: "*"
  espressif/esp_lcd_ek79007:
    version: "*"
    rules:
      - if: "target in [esp32p4]"
  esp32_p4_function_ev_board:
    rules:
      - if: "target in [esp32p4]"
    override_path: "../common_components/esp32_p4_function_ev_board"
  esp32_s31_korvo_1:
    rules:
      - if: "target in [esp32s31]"
    override_path: "../common_components/esp32_s31_korvo_1"
  espressif/esp32_s3_lcd_ev_board:
    version: "^4.*"
    rules:
      - if: "target in [esp32s3]"
  bsp_extra:
    rules:
      - if: "target in [esp32s3]"
    override_path: "../common_components/bsp_extra"
  espressif/esp_new_jpeg:
    version: "^1.0.1"
    rules:
      - if: "target in [esp32s3]"
  espressif/usb_device_uac:
    version: "*"
    override_path: "../../../../../components/usb/usb_device_uac"
  espressif/esp_lcd_touch_ft5x06:
    version: "^1.1.0~1"
    rules:
      - if: "target in [esp32p4, esp32s3]"
  espressif/esp_lcd_touch_gt911:
    version: "^1.2.0~2"
    rules:
      - if: "target in [esp32p4, esp32s3]"
  espressif/esp_lcd_touch_gt1151:
    version: "^1.1.0~1"
    rules:
      - if: "target in [esp32p4, esp32s3, esp32s31]"
